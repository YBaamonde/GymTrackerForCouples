      const load = (k, d) => {

        } catch {
          return d;

      // Devuelve todos los IDs de ejercicios que comparten el mismo nombre que exId
      const getSiblingIds = (routines, exId) => {
        let name = null;
        for (const r of routines) {
          const e = r.exercises.find((e) => e.id === exId);
          if (e) {
            name = e.name;
            break;
          }
        }
        if (!name) return [exId];
        const ids = [];
        routines.forEach((r) =>
          r.exercises.forEach((e) => {
            if (e.name === name) ids.push(e.id);
          }),
        );
        return ids;
      };

      // Busca el último peso del ejercicio en TODAS las sesiones, por nombre
      const getLastWeight = (sessions, user, exId, routines) => {
        const ids = getSiblingIds(routines, exId);
        const sorted = [...sessions].sort(
          (a, b) => new Date(b.date) - new Date(a.date),
        );
        for (const s of sorted) {
          const l = s.logs?.[user]?.find(
            (l) =>
              ids.includes(l.exId) &&
              l.weight !== "" &&
              l.weight != null &&
              !isNaN(parseFloat(l.weight)),
          );
          if (l) return l.weight;
        }
        return null;

      // ─── SPARK CHART ───────────────────────────────────────────────────────────
      function SparkChart({ data, color }) {
        if (!data || data.length < 2)
          return (
            <div
              style={{
                color: "#475569",
                fontSize: 13,
                textAlign: "center",
                padding: "24px 0",
              }}
            >
              Necesitas al menos 2 sesiones registradas para ver la gráfica.
            </div>
          );
        const vals = data.map((d) => parseFloat(d.weight));
        const minV = Math.min(...vals),
          maxV = Math.max(...vals),
          range = maxV - minV || 1;
        const W = 300,
          H = 170,
          pad = { t: 28, r: 12, b: 42, l: 46 };
        const cw = W - pad.l - pad.r,
          ch = H - pad.t - pad.b;
        const pts = data.map((d, i) => ({
          x: pad.l + (i / Math.max(data.length - 1, 1)) * cw,
          y: pad.t + ch - ((parseFloat(d.weight) - minV) / range) * ch,
          d,
        }));
        const pathD = pts
          .map(
            (p, i) =>
              `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`,
          )
          .join(" ");
        const areaD =
          pathD +
          ` L${pts[pts.length - 1].x.toFixed(1)},${(pad.t + ch).toFixed(1)} L${pts[0].x.toFixed(1)},${(pad.t + ch).toFixed(1)} Z`;
        const gId = `g${color.replace(/[^a-z0-9]/gi, "")}`;
        const yL = [minV, minV + range * 0.5, maxV].map((v, i) => ({
          v: Math.round(v * 10) / 10,
          y: pad.t + ch * (1 - i * 0.5),
        }));
        return (
          <svg
            viewBox={`0 0 ${W} ${H}`}
            style={{ width: "100%", overflow: "visible" }}
          >
            <defs>
              <linearGradient id={gId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={color} stopOpacity="0.25" />
                <stop offset="100%" stopColor={color} stopOpacity="0" />
              </linearGradient>
            </defs>
            {yL.map((l, i) => (
              <g key={i}>
                <line
                  x1={pad.l}
                  y1={l.y}
                  x2={pad.l + cw}
                  y2={l.y}
                  stroke="#1e293b"
                  strokeWidth="1"
                />
                <text
                  x={pad.l - 4}
                  y={l.y + 4}
                  fill="#475569"
                  fontSize="10"
                  textAnchor="end"
                >
                  {l.v}
                </text>
              </g>
            ))}
            <path d={areaD} fill={`url(#${gId})`} />
            <path
              d={pathD}
              fill="none"
              stroke={color}
              strokeWidth="2.5"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
            {pts.map((p, i) => {
              const isLast = i === pts.length - 1,
                isFirst = i === 0,
                show = isLast || isFirst || data.length <= 5;
              return (
                <g key={i}>
                  <circle cx={p.x} cy={p.y} r={isLast ? 5 : 3.5} fill={color} />
                  {show && (
                    <text
                      x={p.x}
                      y={p.y - 10}
                      fill={color}
                      fontSize="11"
                      textAnchor="middle"
                      fontWeight="bold"
                    >
                      {parseFloat(p.d.weight)}kg
                    </text>
                  )}
                  <text
                    x={p.x}
                    y={pad.t + ch + 20}
                    fill="#475569"
                    fontSize="9"
                    textAnchor="middle"
                  >
                    {new Date(p.d.date).toLocaleDateString("es", {
                      day: "numeric",
                      month: "short",
                    })}
                  </text>
                </g>
              );
            })}
          </svg>
        );
      }

      // ─── DATA MANAGER ──────────────────────────────────────────────────────────
      function DataManager({ routines, sessions, onImport }) {
        const [msg, setMsg] = useState(null);
        const toast = (m, ok = true) => {
          setMsg({ text: m, ok });
          setTimeout(() => setMsg(null), 3500);
        };
        const fileRef = useRef();

        const exportData = () => {
          const data = JSON.stringify(
            {
              version: 2,
              exported: new Date().toISOString(),
              routines,
              sessions,
            },
            null,
            2,
          );
          const blob = new Blob([data], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `gym-backup-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
          toast("Exportado correctamente");
        };

        const importData = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              if (!data.routines || !data.sessions) throw new Error();
              onImport(data.routines, data.sessions);
              toast("Datos importados correctamente");
            } catch {
              toast("Error: archivo no válido", false);
            }
          };
          reader.readAsText(file);
          e.target.value = "";
        };

        return (
          <div
            style={{
              marginTop: 28,
              borderTop: "1px solid #1e293b",
              paddingTop: 24,
              paddingBottom: 8,
            }}
          >
            <p
              style={{
                fontSize: 11,
                color: "#64748b",
                fontWeight: 600,
                textTransform: "uppercase",
                letterSpacing: 1.2,
                margin: "0 0 12px",
              }}
            >
              Gestión de datos
            </p>
            {msg && (
              <div
                style={{
                  background: "#1e293b",
                  borderRadius: 10,
                  padding: "10px 14px",
                  marginBottom: 12,
                  fontSize: 13,
                  color: msg.ok ? "#4ade80" : "#f87171",
                }}
              >
                {msg.ok ? "✓" : "✗"} {msg.text}
              </div>
            )}
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <button
                onClick={exportData}
                style={{
                  flex: 1,
                  background: "#1e293b",
                  border: "1px solid #334155",
                  borderRadius: 10,
                  padding: "13px 8px",
                  color: "#94a3b8",
                  fontSize: 13,
                  cursor: "pointer",
                  fontWeight: 500,
                }}
              >
                ⬆ Exportar JSON
              </button>
              <label
                style={{
                  flex: 1,
                  background: "#1e293b",
                  border: "1px solid #334155",
                  borderRadius: 10,
                  padding: "13px 8px",
                  color: "#94a3b8",
                  fontSize: 13,
                  cursor: "pointer",
                  textAlign: "center",
                  fontWeight: 500,
                  display: "block",
                }}
              >
                ⬇ Importar JSON
                <input
                  ref={fileRef}
                  type="file"
                  accept=".json"
                  onChange={importData}
                  style={{ display: "none" }}
                />
              </label>
            </div>
            <p
              style={{
                fontSize: 11,
                color: "#334155",
                margin: "6px 0 0",
                lineHeight: 1.5,
              }}
            >
              Exporta regularmente como backup. Al importar se sobreescriben
              todos los datos actuales.
            </p>
          </div>
        );
      }

      // ─── PROGRESS TAB ──────────────────────────────────────────────────────────
      function ProgressTab({ sessions, routines }) {
        const [user, setUser] = useState("Yago");
        const [mode, setMode] = useState("ejercicio"); // "ejercicio" | "rutina"
        const [selExName, setSelExName] = useState(null);
        const [selRoutineId, setSelRoutineId] = useState(null);
        const color = UC[user];

        // Ejercicios únicos por nombre (sin duplicados entre rutinas)
        const uniqueExercises = useMemo(() => {
          const seen = new Set();
          const result = [];
          routines.forEach((r) =>
            r.exercises.forEach((e) => {
              if (!seen.has(e.name)) {
                seen.add(e.name);
                result.push(e);
              }
            }),
          );
          return result;
        }, [routines]);

        // Datos de gráfica: busca por nombre en TODAS las sesiones
        const chartData = useMemo(() => {
          if (!selExName) return [];
          const allIds = [];
          routines.forEach((r) =>
            r.exercises.forEach((e) => {
              if (e.name === selExName) allIds.push(e.id);
            }),
          );
          return sessions
            .filter((s) =>
              allIds.some((id) =>
                s.logs?.[user]?.find(
                  (l) =>
                    l.exId === id &&
                    l.weight !== "" &&
                    l.weight != null &&
                    !isNaN(parseFloat(l.weight)),
                ),
              ),
            )
            .sort((a, b) => new Date(a.date) - new Date(b.date))
            .map((s) => {
              const log = s.logs[user].find(
                (l) =>
                  allIds.includes(l.exId) &&
                  l.weight !== "" &&
                  l.weight != null &&
                  !isNaN(parseFloat(l.weight)),
              );
              return {
                date: s.date,
                weight: parseFloat(log.weight),
                routineName: s.routineName,
              };
            })
            .filter((d) => !isNaN(d.weight));
        }, [sessions, user, selExName, routines]);

        const stats =
          chartData.length > 0
            ? {
                max: Math.max(...chartData.map((d) => d.weight)),
                last: chartData[chartData.length - 1]?.weight,
                delta:
                  chartData.length > 1
                    ? chartData[chartData.length - 1].weight -
                      chartData[0].weight
                    : null,
              }
            : null;

        // Resumen por rutina: para cada ejercicio, primer y último peso del usuario
        const routineSummary = useMemo(() => {
          if (!selRoutineId) return [];
          const r = routines.find((r) => r.id === selRoutineId);
          if (!r) return [];
          return r.exercises.map((ex) => {
            const allIds = [];
            routines.forEach((r2) =>
              r2.exercises.forEach((e) => {
                if (e.name === ex.name) allIds.push(e.id);
              }),
            );
            const pts = sessions
              .filter((s) =>
                allIds.some((id) =>
                  s.logs?.[user]?.find(
                    (l) =>
                      l.exId === id &&
                      l.weight !== "" &&
                      l.weight != null &&
                      !isNaN(parseFloat(l.weight)),
                  ),
                ),
              )
              .sort((a, b) => new Date(a.date) - new Date(b.date))
              .map((s) => {
                const log = s.logs[user].find(
                  (l) =>
                    allIds.includes(l.exId) &&
                    l.weight !== "" &&
                    l.weight != null,
                );
                return log ? parseFloat(log.weight) : null;
              })
              .filter((v) => v != null && !isNaN(v));
            return {
              name: ex.name,
              first: pts[0] ?? null,
              last: pts[pts.length - 1] ?? null,
              delta:
                pts.length > 1
                  ? Math.round((pts[pts.length - 1] - pts[0]) * 10) / 10
                  : null,
              sessions: pts.length,
            };
          });
        }, [selRoutineId, sessions, user, routines]);

        const selRoutine = routines.find((r) => r.id === selRoutineId);

        return (
          <div style={{ padding: "24px 16px" }}>
            <h1
              style={{
                fontSize: 22,
                fontWeight: 700,
                marginBottom: 20,
                color: "#f1f5f9",
              }}
            >
              Progreso
            </h1>

            {/* Selector de persona */}
            <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
              {USERS.map((u) => (
                <button
                  key={u}
                  onClick={() => {
                    setUser(u);
                    setSelExName(null);
                  }}
                  style={{
                    flex: 1,
                    padding: "11px",
                    border: "none",
                    borderRadius: 12,
                    background: user === u ? UC[u] : "#1e293b",
                    color: user === u ? "#0f172a" : "#475569",
                    fontWeight: 700,
                    fontSize: 15,
                    cursor: "pointer",
                  }}
                >
                  {u}
                </button>
              ))}
            </div>

            {/* Selector de modo */}
            <div
              style={{
                display: "flex",
                gap: 0,
                marginBottom: 24,
                background: "#1e293b",
                borderRadius: 12,
                padding: 4,
              }}
            >
              {[
                ["ejercicio", "Por ejercicio"],
                ["rutina", "Por rutina"],
              ].map(([m, label]) => (
                <button
                  key={m}
                  onClick={() => {
                    setMode(m);
                    setSelExName(null);
                    setSelRoutineId(null);
                  }}
                  style={{
                    flex: 1,
                    padding: "9px",
                    border: "none",
                    borderRadius: 9,
                    background: mode === m ? "#0f172a" : "transparent",
                    color: mode === m ? color : "#475569",
                    fontWeight: mode === m ? 700 : 400,
                    fontSize: 13,
                    cursor: "pointer",
                    transition: "all 0.2s",
                  }}
                >
                  {label}
                </button>
              ))}
            </div>

            {/* MODO: Por ejercicio */}
            {mode === "ejercicio" && (
              <>
                <div style={{ marginBottom: 24 }}>
                  <div
                    style={{
                      fontSize: 11,
                      color: "#475569",
                      marginBottom: 10,
                      textTransform: "uppercase",
                      letterSpacing: 1,
                    }}
                  >
                    Ejercicio
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {uniqueExercises.map((ex) => (
                      <button
                        key={ex.name}
                        onClick={() =>
                          setSelExName(ex.name === selExName ? null : ex.name)
                        }
                        style={{
                          padding: "8px 14px",
                          border: `1px solid ${selExName === ex.name ? color : "#1e293b"}`,
                          borderRadius: 20,
                          background:
                            selExName === ex.name ? `${color}22` : "#1e293b",
                          color: selExName === ex.name ? color : "#64748b",
                          fontSize: 12,
                          cursor: "pointer",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {ex.name}
                      </button>
                    ))}
                  </div>
                </div>

                {selExName ? (
                  <div
                    style={{
                      background: "#1e293b",
                      borderRadius: 14,
                      padding: 16,
                    }}
                  >
                    <div
                      style={{
                        fontWeight: 700,
                        fontSize: 16,
                        color: "#f1f5f9",
                        marginBottom: 2,
                      }}
                    >
                      {selExName}
                    </div>
                    <div
                      style={{
                        fontSize: 12,
                        color: "#475569",
                        marginBottom: 16,
                      }}
                    >
                      {chartData.length}{" "}
                      {chartData.length === 1 ? "sesión" : "sesiones"}{" "}
                      registradas con {user}
                    </div>
                    <SparkChart data={chartData} color={color} />
                    {stats && chartData.length >= 2 && (
                      <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
                        {[
                          { label: "Máximo", value: `${stats.max}kg` },
                          { label: "Último", value: `${stats.last}kg` },
                          {
                            label: "Ganado",
                            value:
                              stats.delta != null
                                ? `${stats.delta > 0 ? "+" : ""}${Math.round(stats.delta * 10) / 10}kg`
                                : "—",
                            color:
                              stats.delta > 0
                                ? "#4ade80"
                                : stats.delta < 0
                                  ? "#f87171"
                                  : "#94a3b8",
                          },
                        ].map((s) => (
                          <div
                            key={s.label}
                            style={{
                              flex: 1,
                              background: "#0f172a",
                              borderRadius: 10,
                              padding: "12px 8px",
                              textAlign: "center",
                            }}
                          >
                            <div
                              style={{
                                fontSize: 16,
                                fontWeight: 700,
                                color: s.color || color,
                              }}
                            >
                              {s.value}
                            </div>
                            <div
                              style={{
                                fontSize: 10,
                                color: "#475569",
                                marginTop: 3,
                              }}
                            >
                              {s.label}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <div
                    style={{
                      background: "#1e293b",
                      borderRadius: 14,
                      padding: "36px 16px",
                      textAlign: "center",
                      color: "#475569",
                    }}
                  >
                    <div style={{ fontSize: 36, marginBottom: 10 }}>👆</div>
                    <div style={{ fontSize: 14 }}>
                      Selecciona un ejercicio para ver la evolución
                    </div>
                  </div>
                )}
              </>
            )}

            {/* MODO: Por rutina */}
            {mode === "rutina" && (
              <>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    gap: 8,
                    marginBottom: 24,
                  }}
                >
                  {routines.map((r) => (
                    <button
                      key={r.id}
                      onClick={() =>
                        setSelRoutineId(r.id === selRoutineId ? null : r.id)
                      }
                      style={{
                        background: "#1e293b",
                        border: `1px solid ${selRoutineId === r.id ? r.color : "#1e293b"}`,
                        borderLeft: `4px solid ${r.color}`,
                        borderRadius: 12,
                        padding: "14px 16px",
                        textAlign: "left",
                        cursor: "pointer",
                        color: "#f1f5f9",
                        display: "flex",
                        justifyContent: "space-between",
                        alignItems: "center",
                      }}
                    >
                      <div style={{ fontWeight: 700, fontSize: 15 }}>
                        {r.name}
                      </div>
                      <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#64748b"
                        strokeWidth="2.5"
                      >
                        <path
                          d={
                            selRoutineId === r.id
                              ? "M18 15l-6-6-6 6"
                              : "M6 9l6 6 6-6"
                          }
                        />
                      </svg>
                    </button>
                  ))}
                </div>

                {selRoutineId && selRoutine && (
                  <div
                    style={{
                      background: "#1e293b",
                      borderRadius: 14,
                      overflow: "hidden",
                    }}
                  >
                    <div
                      style={{
                        padding: "12px 16px",
                        borderBottom: "1px solid #0f172a",
                        display: "flex",
                        alignItems: "center",
                        gap: 8,
                      }}
                    >
                      <div
                        style={{
                          width: 4,
                          height: 20,
                          borderRadius: 2,
                          background: selRoutine.color,
                        }}
                      />
                      <div
                        style={{
                          fontSize: 13,
                          fontWeight: 700,
                          color: "#f1f5f9",
                        }}
                      >
                        {selRoutine.name}
                      </div>
                      <div
                        style={{
                          fontSize: 12,
                          color: "#475569",
                          marginLeft: "auto",
                        }}
                      >
                        Progreso de {user}
                      </div>
                    </div>
                    {routineSummary.map((ex, i) => (
                      <div
                        key={ex.name}
                        style={{
                          padding: "12px 16px",
                          borderBottom:
                            i < routineSummary.length - 1
                              ? "1px solid #0f172a88"
                              : "none",
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                        }}
                      >
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div
                            style={{
                              fontSize: 13,
                              fontWeight: 500,
                              color: "#e2e8f0",
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                              whiteSpace: "nowrap",
                            }}
                          >
                            {ex.name}
                          </div>
                          <div
                            style={{
                              fontSize: 11,
                              color: "#475569",
                              marginTop: 2,
                            }}
                          >
                            {ex.sessions}{" "}
                            {ex.sessions === 1 ? "sesión" : "sesiones"}
                          </div>
                        </div>
                        <div
                          style={{
                            display: "flex",
                            gap: 12,
                            alignItems: "center",
                            flexShrink: 0,
                            marginLeft: 12,
                          }}
                        >
                          {ex.last != null ? (
                            <>
                              <div style={{ textAlign: "right" }}>
                                <div
                                  style={{
                                    fontSize: 15,
                                    fontWeight: 700,
                                    color,
                                  }}
                                >
                                  {ex.last}kg
                                </div>
                                <div style={{ fontSize: 10, color: "#475569" }}>
                                  último
                                </div>
                              </div>
                              {ex.delta != null && (
                                <div
                                  style={{
                                    background:
                                      ex.delta > 0
                                        ? "#4ade8018"
                                        : ex.delta < 0
                                          ? "#ef444418"
                                          : "#1e293b",
                                    borderRadius: 8,
                                    padding: "4px 8px",
                                    minWidth: 44,
                                    textAlign: "center",
                                  }}
                                >
                                  <div
                                    style={{
                                      fontSize: 13,
                                      fontWeight: 700,
                                      color:
                                        ex.delta > 0
                                          ? "#4ade80"
                                          : ex.delta < 0
                                            ? "#f87171"
                                            : "#64748b",
                                    }}
                                  >
                                    {ex.delta > 0 ? "+" : ""}
                                    {ex.delta}kg
                                  </div>
                                </div>
                              )}
                            </>
                          ) : (
                            <div style={{ fontSize: 12, color: "#334155" }}>
                              Sin datos
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {!selRoutineId && (
                  <div
                    style={{
                      background: "#1e293b",
                      borderRadius: 14,
                      padding: "36px 16px",
                      textAlign: "center",
                      color: "#475569",
                    }}
                  >
                    <div style={{ fontSize: 36, marginBottom: 10 }}>👆</div>
                    <div style={{ fontSize: 14 }}>
                      Selecciona una rutina para ver el resumen
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        );
      }

      // ─── APP ROOT ──────────────────────────────────────────────────────────────
      function App() {
        const [tab, setTab] = useState("home");
        const [routines, setRoutines] = useState(() =>
          load(SK.R, DEFAULT_ROUTINES),
        );
        const [sessions, setSessions] = useState(() =>
          load(SK.S, DEFAULT_SESSIONS),
        );
        const [workout, setWorkout] = useState(null);
        const [infoModal, setInfoModal] = useState({
          ex: null,
          mode: "workout",
        });

        const updateRoutines = (r) => {
          setRoutines(r);
          persist(SK.R, r);
        };
        const updateSessions = (s) => {
          setSessions(s);
          persist(SK.S, s);
        };
        const handleImport = (r, s) => {
          updateRoutines(r);
          updateSessions(s);
        };

        const startWorkout = (routine) => {
          const logs = {};
          USERS.forEach((user) => {
            logs[user] = routine.exercises.map((ex) => ({
              exId: ex.id,
              weight: getLastWeight(sessions, user, ex.id, routines) ?? "",
              reps: ex[user].reps,
              sets: ex[user].sets,
              done: false,
            }));
          });
          setWorkout({
            routineId: routine.id,
            routineName: routine.name,
            routineColor: routine.color,
            logs,
          });
          setTab("workout");
        };

        const finishWorkout = () => {
          const session = {
            id: Date.now().toString(),
            date: new Date().toISOString(),
            routineId: workout.routineId,
            routineName: workout.routineName,
            logs: workout.logs,
          };
          updateSessions([session, ...sessions]);
          setWorkout(null);
          setTab("home");
        };

        const openInfo = (ex, mode) => setInfoModal({ ex, mode });
        const closeInfo = () => setInfoModal({ ex: null, mode: "workout" });

        return (
          <div
            style={{
              background: "#0f172a",
              color: "#f1f5f9",
              minHeight: "100dvh",
              maxWidth: 480,
              margin: "0 auto",
              display: "flex",
              flexDirection: "column",
              position: "relative",
            }}
          >
            {infoModal.ex && (
              <InfoModal
                exercise={infoModal.ex}
                mode={infoModal.mode}
                onClose={closeInfo}
              />
            )}
            <div style={{ flex: 1, overflowY: "auto", paddingBottom: 80 }}>
              {tab === "home" && (
                <HomeTab
                  routines={routines}
                  sessions={sessions}
                  onStart={startWorkout}
                />
              )}
              {tab === "workout" && (
                <WorkoutTab
                  workout={workout}
                  routines={routines}
                  setWorkout={setWorkout}
                  onFinish={finishWorkout}
                  onCancel={() => {
                    setWorkout(null);
                    setTab("home");
                  }}
                  onInfo={openInfo}
                />
              )}
              {tab === "routines" && (
                <RoutinesTab
                  routines={routines}
                  updateRoutines={updateRoutines}
                  sessions={sessions}
                  onImport={handleImport}
                  onInfo={openInfo}
                />
              )}
              {tab === "progress" && (
                <ProgressTab sessions={sessions} routines={routines} />
              )}
            </div>
            <BottomNav tab={tab} setTab={setTab} hasWorkout={!!workout} />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
